<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Class 1 (244 Hours) Eligibility | Barnala Driver Training Academy</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --blue:#0057B8;
    --dark:#171817;
    --light:#f7f3ed;
    --white:#ffffff;
    --grey:#666;

}

body{

    font-family:"Inter",sans-serif;
    background:var(--light);
    color:var(--dark);

}

.container{

    width:min(92%,1400px);
    margin:auto;

}

h1,h2,h3{

    font-family:"Manrope",sans-serif;

}
/* =========================
   HERO SECTION
========================= */

.hero-section{

    background:#171817;
    color:#fff;

    padding:110px 0 90px;

}

.hero-content{

    max-width:900px;

}

.hero-label{

    color:#0057B8;

    font-size:14px;
    font-weight:800;

    text-transform:uppercase;
    letter-spacing:1px;

    margin-bottom:20px;

}

.hero-section h1{

    font-size:clamp(38px,5vw,62px);
    line-height:1.05;

    text-transform:uppercase;

    margin-bottom:25px;

}

.hero-section p{

    max-width:760px;

    font-size:18px;
    line-height:1.8;

    color:#d2d2d2;

}

@media(max-width:768px){

.hero-section{

    padding:80px 0 60px;

}

.hero-section h1{

    font-size:34px;

}

.hero-section p{

    font-size:16px;

}

}    
</style>

</head>

<body>

<div id="site-header"></div>



<section class="hero-section">

    <div class="container">

        <div class="hero-content">

            <div class="hero-label">
                CLASS 1 (244 HOURS)
            </div>

            <h1>
                Eligibility Requirements
            </h1>

            <p>
                Before enrolling in the Class 1 (244 Hours) training program,
                review the eligibility requirements below to ensure you meet
                Manitoba's licensing standards for commercial driver training.
            </p>

        </div>

    </div>

</section>



<!-- INTRODUCTION GOES HERE -->



<!-- ELIGIBILITY CARDS GO HERE -->



<div id="site-footer"></div>

<script>

fetch('header.html')
.then(response=>response.text())
.then(data=>{
document.getElementById('site-header').innerHTML=data;
});

fetch('footer.html')
.then(response=>response.text())
.then(data=>{
document.getElementById('site-footer').innerHTML=data;
});

</script>

</body>
</html>
