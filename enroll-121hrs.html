<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Class 1 (121.5 Hrs) | Barnala Driver Training Academy</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">

<style>

/*=====================================================
RESET
=====================================================*/

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{

--blue:#0057B8;
--dark:#171817;
--light:#f7f3ed;
--white:#ffffff;
--grey:#6b6b6b;

}

html{
scroll-behavior:smooth;
}

body{

font-family:"Inter",sans-serif;
background:var(--light);
color:var(--dark);
overflow-x:hidden;

}

.container{

width:min(92%,1400px);
margin:auto;

}

h1,h2,h3{

font-family:"Manrope",sans-serif;

}

/*=====================================================
HERO
=====================================================*/

.hero{

position:relative;

height:75vh;
min-height:650px;

display:flex;
align-items:center;

overflow:hidden;

background:#000;

}

.hero-image{

position:absolute;

inset:0;

width:100%;
height:100%;

object-fit:cover;

}

.hero-overlay{

position:absolute;

inset:0;

background:linear-gradient(
90deg,
rgba(0,0,0,.75),
rgba(0,0,0,.45)
);

}

.hero-content{

position:relative;

z-index:2;

max-width:760px;

color:#fff;

}

.hero-tag{

display:inline-block;

padding:10px 20px;

background:#0057B8;

border-radius:50px;

font-size:13px;

font-weight:700;

letter-spacing:1px;

margin-bottom:25px;

}

.hero-content h1{

font-size:clamp(58px,7vw,90px);

line-height:1;

margin-bottom:15px;

}

.hero-content p{

font-size:22px;

color:#e8e8e8;

}

/*=====================================================
COURSE
=====================================================*/

.course-section{

padding:100px 0 80px;

text-align:center;

}

.section-heading{

max-width:720px;

margin:auto auto 55px;

}

.section-heading h2{

font-size:clamp(36px,4vw,58px);

margin-bottom:20px;

line-height:1.1;

}

.section-heading p{

font-size:19px;

color:#666;

line-height:1.8;

}

.course-switch{

display:flex;

justify-content:center;

gap:25px;

flex-wrap:wrap;

}

.course-btn{

width:230px;
height:74px;

border-radius:60px;

display:flex;

align-items:center;
justify-content:center;

text-decoration:none;

font-size:20px;

font-weight:700;

border:2px solid #0057B8;

cursor:pointer;

transition:.35s;

}

.course-btn.active{

background:#0057B8;

color:#fff;

}

.course-btn:not(.active){

background:#fff;

color:#0057B8;

}

.course-btn:hover{

transform:translateY(-4px);

box-shadow:0 15px 35px rgba(0,87,184,.18);

}
  /*=====================================================
WIZARD SECTION
=====================================================*/

.wizard-section{

padding:0 0 100px;

}

.wizard-card{

max-width:900px;

margin:auto;

background:#fff;

border-radius:28px;

padding:60px;

box-shadow:0 20px 60px rgba(0,0,0,.08);

}

#wizard{

text-align:center;

}

#questionTitle{

font-size:clamp(34px,4vw,52px);

line-height:1.2;

margin-bottom:45px;

}

#questionButtons{

display:flex;

justify-content:center;

gap:25px;

flex-wrap:wrap;

}

#questionButtons button{

width:220px;

height:68px;

border:none;

border-radius:50px;

background:#0057B8;

color:#fff;

font-size:20px;

font-weight:700;

cursor:pointer;

transition:.35s;

}

#questionButtons button:last-child{

background:#171817;

}

#questionButtons button:hover{

transform:translateY(-4px);

box-shadow:0 18px 35px rgba(0,0,0,.15);

}

/*=====================================================
RESULT
=====================================================*/

#resultSection{

padding:0 0 100px;

}

.result-card{

max-width:900px;

margin:auto;

background:#fff;

padding:70px;

border-radius:28px;

text-align:center;

box-shadow:0 20px 60px rgba(0,0,0,.08);

}

#resultTitle{

font-size:clamp(40px,5vw,60px);

margin-bottom:20px;

}

#resultText{

max-width:650px;

margin:auto;

font-size:19px;

line-height:1.9;

color:#666;

margin-bottom:40px;

}

#resultButton{

padding:18px 45px;

border:none;

border-radius:50px;

background:#0057B8;

color:#fff;

font-size:18px;

font-weight:700;

cursor:pointer;

transition:.35s;

}

#resultButton:hover{

background:#171817;

transform:translateY(-4px);

}

/*=====================================================
REGISTRATION FORM
=====================================================*/

#registrationSection{

padding:110px 0;

background:#fff;

}

.registration-card{

max-width:1100px;

margin:auto;

background:#fff;

padding:60px;

border-radius:28px;

box-shadow:0 20px 60px rgba(0,0,0,.08);

}

.registration-card h2{

text-align:center;

font-size:clamp(34px,4vw,54px);

margin-bottom:18px;

}

.registration-card p{

max-width:700px;

margin:0 auto 45px;

text-align:center;

font-size:18px;

color:#666;

line-height:1.8;

}

.form-grid{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:24px;

}

.form-grid div{

display:flex;

flex-direction:column;

}

.form-grid label{

font-size:15px;

font-weight:700;

margin-bottom:10px;

}

.form-grid input,
.form-grid select,
.form-grid textarea{

width:100%;

padding:18px;

border:1px solid #d8d8d8;

border-radius:14px;

font-size:16px;

font-family:inherit;

transition:.3s;

}

.form-grid textarea{

resize:vertical;

min-height:180px;

}

.form-grid input:focus,
.form-grid select:focus,
.form-grid textarea:focus{

outline:none;

border-color:#0057B8;

box-shadow:0 0 0 4px rgba(0,87,184,.12);

}

.form-grid button{

grid-column:1/-1;

height:66px;

margin-top:15px;

border:none;

border-radius:50px;

background:#0057B8;

color:#fff;

font-size:18px;

font-weight:700;

cursor:pointer;

transition:.35s;

}

.form-grid button:hover{

background:#171817;

transform:translateY(-3px);

}

/*=====================================================
ANIMATION
=====================================================*/

.hero-content,
.course-section,
.wizard-card,
.result-card,
.registration-card{

animation:fadeUp .8s ease;

}

@keyframes fadeUp{

from{

opacity:0;

transform:translateY(35px);

}

to{

opacity:1;

transform:translateY(0);

}

}

/*=====================================================
RESPONSIVE
=====================================================*/

@media(max-width:992px){

.hero{

min-height:520px;

height:auto;

padding:120px 0;

}

.wizard-card{

padding:40px;

}

.registration-card{

padding:40px;

}

.form-grid{

grid-template-columns:1fr;

}

}

@media(max-width:768px){

.hero-content{

text-align:center;

}

.hero-content h1{

font-size:46px;

}

.section-heading h2{

font-size:34px;

}

#questionTitle{

font-size:30px;

}

#questionButtons{

flex-direction:column;

align-items:center;

}

#questionButtons button{

width:100%;

max-width:320px;

}

.course-btn{

width:100%;

max-width:320px;

}

.registration-card{

padding:35px 25px;

}

.result-card{

padding:40px 25px;

}

}

@media(max-width:480px){

.hero-content h1{

font-size:36px;

}

.hero-tag{

font-size:11px;

}

}

</style>

</head>

<body>

<!-- ===========================
HEADER
=========================== -->

<div id="site-header"></div>

<!-- ===========================
HERO
=========================== -->

<section class="hero">

    <div class="hero-overlay"></div>

    <img
        src="images/class1-hero.jpg"
        alt="Class 1 Training"
        class="hero-image">

    <div class="container">

        <div class="hero-content">

            <span class="hero-tag">
                CLASS 1
            </span>

            <h1>121.5 Hrs</h1>

        </div>

    </div>

</section>

<!-- ===========================
COURSE SECTION
=========================== -->

<section class="course-section">

    <div class="container">

        <div class="section-heading">

            <h2>
                Choose Your Class 1 Course
            </h2>

            <p>
                Let's see if you are eligible for this course
            </p>

        </div>

        <div class="course-switch">

            <button class="course-btn active">
                121.5 Hrs
            </button>

            <a
                href="enroll-244hrs.html"
                class="course-btn">

                244 Hrs

            </a>

        </div>

    </div>

</section>

<!-- ===========================
ELIGIBILITY WIZARD
=========================== -->

<section class="wizard-section">

<div class="container">

<div class="wizard-card">

<div id="wizard">

    <div class="wizard-progress">

        <div class="progress-bar">

            <div class="progress-fill" id="progressFill"></div>

        </div>

        <span id="progressText">
            Step 1 of 6
        </span>

    </div>

    <div class="wizard-body">

        <h2 id="questionTitle">
            Are you 18 or plus?
        </h2>

        <p id="questionSubtitle">

            Answer the following questions to check your eligibility.

        </p>

        <div id="answerContainer">

            <button class="wizard-btn" data-value="yes">

                Yes

            </button>

            <button class="wizard-btn secondary" data-value="no">

                No

            </button>

        </div>

    </div>

</div>

</div>

</div>

</section>

<!-- ===========================
RESULT
=========================== -->

<section
id="resultSection"
style="display:none;">

<div class="container">

<div class="result-card">

<h2 id="resultTitle"></h2>

<p id="resultText"></p>

<button id="resultButton">

Continue

</button>

</div>

</div>

</section>

<!-- ===========================
REGISTRATION FORM
=========================== -->

<section
id="registrationSection"
style="display:none;">

<div class="container">

<div class="registration-card">

<h2 id="formHeading">

Registration Request for Class 1

</h2>

<p id="formText">

Complete the form below and our team will contact you.

</p>

<form id="registrationForm">

<input
type="hidden"
id="selectedLicence">

<input
type="hidden"
id="eligibilityResult">

<div class="form-grid">

<div>

<label>

First Name

</label>

<input type="text">

</div>

<div>

<label>

Last Name

</label>

<input type="text">

</div>

<div>

<label>

Phone

</label>

<input type="tel">

</div>

<div>

<label>

Email

</label>

<input type="email">

</div>

<div>

<label>

Selected Course

</label>

<input
type="text"
value="Class 1 (121.5 Hrs)"
readonly>

</div>

<div>

<label>

Branch

</label>

<select>

<option>Select Branch</option>

<option>Winnipeg</option>

<option>Steinbach</option>

<option>Portage la Prairie</option>

</select>

</div>

<div>

<label>

Preferred Intake

</label>

<select>

<option>Select Intake</option>

</select>

</div>

Message

type="submit">

Submit Registration Request

</button>

</div>

</div>

</section>

<!-- ===========================
FOOTER
=========================== -->

<div id="site-footer"></div>

<script>

fetch("header.html")
.then(response=>response.text())
.then(data=>{
document.getElementById("site-header").innerHTML=data;
});

fetch("footer.html")
.then(response=>response.text())
.then(data=>{
document.getElementById("site-footer").innerHTML=data;
});

</script>

<script>

/* ==========================================
   ENROLL 121.5 HRS WIZARD
========================================== */

const questions = [

{
title:"Are you 18 or plus?",
subtitle:"Answer the following questions to check your eligibility.",
type:"yesno",
step:1
},

{
title:"Which class of License do you have?",
subtitle:"Select your current Manitoba licence.",
type:"license",
step:2
},

{
title:"Have you passed Air Brake Knowledge Test?",
subtitle:"",
type:"yesno",
step:3
},

{
title:"Have you passed Class 1 Knowledge Test?",
subtitle:"",
type:"yesno",
step:4
},

{
title:"Have you completed your Medical Examination?",
subtitle:"",
type:"yesno",
step:5
},

{
title:"Do you meet the English Language Requirement?",
subtitle:"",
type:"yesno",
step:6
}

];

let currentQuestion = 0;
let licence = "";

const title = document.getElementById("questionTitle");
const subtitle = document.getElementById("questionSubtitle");
const answers = document.getElementById("answerContainer");
const progress = document.getElementById("progressFill");
const progressText = document.getElementById("progressText");

loadQuestion();

function loadQuestion(){

let q = questions[currentQuestion];

title.innerHTML = q.title;
subtitle.innerHTML = q.subtitle;

progress.style.width=((q.step)/6*100)+"%";
progressText.innerHTML="Step "+q.step+" of 6";

answers.innerHTML="";

if(q.type==="yesno"){
createYesNo();
}

if(q.type==="license"){
createLicenceButtons();
}

}
  /*=========================================
CREATE YES / NO BUTTONS
=========================================*/

function createYesNo(){

answers.innerHTML=`

<button class="wizard-btn" onclick="answerYes()">

Yes

</button>

<button class="wizard-btn secondary" onclick="answerNo()">

No

</button>

`;

}

/*=========================================
CREATE LICENCE BUTTONS
=========================================*/

function createLicenceButtons(){

answers.innerHTML=`

<button class="wizard-btn licence-btn"
onclick="selectLicence('5L')">

Class 5L

</button>

<button class="wizard-btn licence-btn"
onclick="selectLicence('5I')">

Class 5I

</button>

<button class="wizard-btn licence-btn"
onclick="selectLicence('5F')">

Class 5F

</button>

<button class="wizard-btn licence-btn"
onclick="selectLicence('3')">

Class 3

</button>

<button class="wizard-btn licence-btn"
onclick="selectLicence('2')">

Class 2

</button>

`;

}

/*=========================================
SAVE LICENCE
=========================================*/

function selectLicence(type){

licence=type;

document.getElementById("selectedLicence").value=type;

currentQuestion++;

loadQuestion();

}
  /*=========================================
YES BUTTON
=========================================*/

function answerYes(){

switch(currentQuestion){

case 0:

currentQuestion=1;
loadQuestion();
break;

case 2:

currentQuestion=3;
loadQuestion();
break;

case 3:

currentQuestion=4;
loadQuestion();
break;

case 4:

currentQuestion=5;
loadQuestion();
break;

case 5:

showCongratulations();
break;

}

}

/*=========================================
NO BUTTON
=========================================*/

function answerNo(){

switch(currentQuestion){

case 0:

showNoWorries(
"Sorry, you must be at least 18 years old to enrol in this program."
);

break;

case 2:

showNoWorries(
"You must pass the Air Brake Knowledge Test before enrolling."
);

break;

case 3:

showNoWorries(
"You must pass the Class 1 Knowledge Test before enrolling."
);

break;

case 4:

showNoWorries(
"You must complete your Medical Examination before enrolling."
);

break;

case 5:

showNoWorries(
"You must meet the English language requirement before enrolling."
);

break;

}

}

/*=========================================
CONGRATULATIONS
=========================================*/

function showCongratulations(){

document.querySelector(".wizard-section").style.display="none";

document.getElementById("resultSection").style.display="block";

document.getElementById("resultTitle").innerHTML=
"Congratulations!";

document.getElementById("resultText").innerHTML=
"You are eligible to enrol in the Class 1 (121.5 Hrs) program.";

document.getElementById("eligibilityResult").value="Eligible";

const btn=document.getElementById("resultButton");

btn.innerHTML="Proceed to Registration";

btn.onclick=function(){

document.getElementById("resultSection").style.display="none";

document.getElementById("registrationSection").style.display="block";

window.scrollTo({

top:document.getElementById("registrationSection").offsetTop-80,

behavior:"smooth"

});

};

}

/*=========================================
NO WORRIES
=========================================*/

function showNoWorries(message){

document.querySelector(".wizard-section").style.display="none";

document.getElementById("resultSection").style.display="block";

document.getElementById("resultTitle").innerHTML=
"No Worries";

document.getElementById("resultText").innerHTML=
message;

document.getElementById("eligibilityResult").value="Not Eligible";

const btn=document.getElementById("resultButton");

btn.innerHTML="Let's Connect";

btn.onclick=function(){

document.getElementById("resultSection").style.display="none";

document.getElementById("registrationSection").style.display="block";

window.scrollTo({

top:document.getElementById("registrationSection").offsetTop-80,

behavior:"smooth"

});

};

}
  /*=========================================
FORM
=========================================*/

const registrationForm=document.getElementById("registrationForm");

if(registrationForm){

registrationForm.addEventListener("submit",function(e){

e.preventDefault();

alert(
"Thank you! Your registration request has been submitted successfully. Our team will contact you shortly."
);

registrationForm.reset();

document.getElementById("eligibilityResult").value="";
document.getElementById("selectedLicence").value="";

});

}

/*=========================================
BUTTON ANIMATION
=========================================*/

document.addEventListener("click",function(e){

if(e.target.classList.contains("wizard-btn")){

e.target.style.transform="scale(.97)";

setTimeout(function(){

e.target.style.transform="";

},120);

}

});

/*=========================================
FADE BETWEEN QUESTIONS
=========================================*/

function fadeQuestion(){

const body=document.querySelector(".wizard-body");

body.style.opacity="0";

body.style.transform="translateY(20px)";

setTimeout(function(){

loadQuestion();

body.style.opacity="1";

body.style.transform="translateY(0)";

},220);

}

/*=========================================
SMOOTH SCROLL
=========================================*/

window.scrollTo({

top:0,

behavior:"smooth"

});

console.log("Barnala Enroll Wizard Loaded Successfully");

</script>
</body>

</html>
