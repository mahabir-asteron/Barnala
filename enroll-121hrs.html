<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Class 1 (121.5 Hrs) | Barnala Driver Training Academy</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">

<style>

/*=====================================================
RESET
=====================================================*/

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{

--blue:#0057B8;
--dark:#171817;
--light:#f7f3ed;
--white:#ffffff;
--grey:#666666;

}

html{

scroll-behavior:smooth;

}

body{

font-family:"Inter",sans-serif;

background:var(--light);

color:var(--dark);

line-height:1.7;

overflow-x:hidden;

}

.container{

width:min(92%,1400px);

margin:auto;

}

h1,h2,h3{

font-family:"Manrope",sans-serif;

font-weight:800;

}

section{

position:relative;

}
  /*=====================================================
HERO
=====================================================*/

.hero-section{

position:relative;

height:72vh;

min-height:650px;

display:flex;

align-items:center;

justify-content:center;

overflow:hidden;

background:#000;

}

.hero-image{

position:absolute;

width:100%;

height:100%;

object-fit:cover;

inset:0;

}

.hero-overlay{

position:absolute;

inset:0;

background:linear-gradient(

90deg,

rgba(0,0,0,.72),

rgba(0,0,0,.45)

);

}

.hero-content{

position:relative;

z-index:2;

max-width:760px;

color:#fff;

}

.hero-badge{

display:inline-block;

padding:10px 22px;

border-radius:50px;

background:#0057B8;

font-size:13px;

font-weight:700;

letter-spacing:1px;

text-transform:uppercase;

margin-bottom:24px;

}

.hero-content h1{

font-size:clamp(56px,7vw,90px);

line-height:1;

margin-bottom:18px;

}

.hero-content p{

font-size:24px;

color:#e6e6e6;

}
  /*=====================================================
COURSE
=====================================================*/

.course-section{

padding:100px 0 70px;

text-align:center;

}

.course-section h2{

font-size:clamp(34px,4vw,52px);

margin-bottom:18px;

}

.course-section p{

font-size:18px;

color:#666;

margin-bottom:45px;

}

.course-buttons{

display:flex;

justify-content:center;

gap:28px;

flex-wrap:wrap;

}

.course-btn{

display:inline-flex;

align-items:center;

justify-content:center;

width:230px;

height:74px;

border-radius:60px;

text-decoration:none;

font-size:20px;

font-weight:700;

border:2px solid #0057B8;

transition:.35s;

cursor:pointer;

}

.course-btn.active{

background:#0057B8;

color:#fff;

}

.course-btn:not(.active){

background:#fff;

color:#0057B8;

}

.course-btn:hover{

transform:translateY(-4px);

}
  /*=====================================================
WIZARD
=====================================================*/

.wizard-section{

padding-bottom:100px;

}

.wizard-card{

max-width:900px;

margin:auto;

background:#fff;

border-radius:28px;

padding:65px;

box-shadow:0 18px 60px rgba(0,0,0,.08);

}

#wizard{

text-align:center;

}

#questionTitle{

font-size:42px;

margin-bottom:45px;

line-height:1.3;

}

#answers{

display:flex;

justify-content:center;

gap:25px;

flex-wrap:wrap;

}

.answer-btn{

width:220px;

height:70px;

border-radius:50px;

border:none;

background:#0057B8;

color:#fff;

font-size:20px;

font-weight:700;

cursor:pointer;

transition:.35s;

}

.answer-btn:last-child{

background:#171817;

}

.answer-btn:hover{

transform:translateY(-4px);

}
  /*=====================================================
RESULT
=====================================================*/

#resultSection{

padding-bottom:100px;

}

.result-card{

max-width:900px;

margin:auto;

background:#fff;

padding:70px;

border-radius:28px;

text-align:center;

box-shadow:0 18px 60px rgba(0,0,0,.08);

}

#resultTitle{

font-size:54px;

margin-bottom:22px;

}

#resultText{

font-size:20px;

color:#666;

margin-bottom:40px;

}

#resultButton{

padding:18px 40px;

border:none;

border-radius:50px;

background:#0057B8;

color:#fff;

font-size:18px;

font-weight:700;

cursor:pointer;

transition:.35s;

}

#resultButton:hover{

background:#171817;

}
  /*=====================================================
REGISTRATION SECTION
=====================================================*/

#registrationSection{

padding:110px 0;

background:#ffffff;

}

.registration-card{

max-width:1100px;

margin:auto;

background:#fff;

padding:60px;

border-radius:28px;

box-shadow:0 20px 60px rgba(0,0,0,.08);

}

.registration-card h2{

font-size:clamp(36px,4vw,54px);

text-align:center;

margin-bottom:18px;

}

.registration-card p{

text-align:center;

max-width:700px;

margin:0 auto 45px;

font-size:18px;

color:#666;

line-height:1.8;

}

/*=====================================================
FORM
=====================================================*/

.form-grid{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:25px;

}

.form-grid div{

display:flex;

flex-direction:column;

}

.form-grid label{

font-weight:700;

margin-bottom:10px;

font-size:15px;

}

.form-grid input,
.form-grid select,
.form-grid textarea{

width:100%;

padding:18px;

border:1px solid #d8d8d8;

border-radius:14px;

font-size:16px;

font-family:inherit;

transition:.3s;

background:#fff;

}

.form-grid textarea{

resize:vertical;

min-height:180px;

}

.form-grid input:focus,
.form-grid select:focus,
.form-grid textarea:focus{

outline:none;

border-color:#0057B8;

box-shadow:0 0 0 4px rgba(0,87,184,.12);

}

.form-grid button{

grid-column:1/-1;

margin-top:20px;

height:65px;

border:none;

border-radius:50px;

background:#0057B8;

color:#fff;

font-size:19px;

font-weight:700;

cursor:pointer;

transition:.35s;

}

.form-grid button:hover{

background:#171817;

transform:translateY(-3px);

}

/*=====================================================
ANIMATIONS
=====================================================*/

.hero-content,
.course-section,
.wizard-card,
.result-card,
.registration-card{

animation:fadeUp .8s ease;

}

@keyframes fadeUp{

0%{

opacity:0;

transform:translateY(35px);

}

100%{

opacity:1;

transform:translateY(0);

}

}

/*=====================================================
MOBILE
=====================================================*/

@media(max-width:992px){

.hero-section{

min-height:520px;

height:auto;

padding:120px 0;

}

.hero-content h1{

font-size:58px;

}

.wizard-card{

padding:40px;

}

.registration-card{

padding:40px;

}

.form-grid{

grid-template-columns:1fr;

}

}

@media(max-width:768px){

.hero-content{

text-align:center;

}

.hero-content h1{

font-size:44px;

}

.hero-content p{

font-size:18px;

}

.course-section{

padding:70px 0 50px;

}

.course-btn{

width:100%;

max-width:320px;

}

#wizardCard{

padding:30px;

}

#questionTitle{

font-size:30px;

}

#answers{

flex-direction:column;

}

.answer-btn{

width:100%;

}

.result-card{

padding:40px 25px;

}

.registration-card{

padding:35px 25px;

}

}

@media(max-width:480px){

.hero-content h1{

font-size:38px;

}

.hero-badge{

font-size:11px;

padding:8px 18px;

}

.registration-card h2{

font-size:32px;

}

}

</style>

</head>

<body>

<!-- ===========================
HEADER
=========================== -->

<div id="site-header"></div>

<!-- ===========================
HERO
=========================== -->

<section class="hero-section">

<div class="hero-overlay"></div>

<img
src="images/class1-hero.jpg"
alt="Class 1 Truck Training"
class="hero-image">

<div class="container">

<div class="hero-content">

<div class="hero-badge">

CLASS 1

</div>

<h1>

121.5 Hrs

</h1>

<p>

Choose Your Class 1 Course

</p>

</div>

</div>

</section>

<!-- ===========================
COURSE
=========================== -->

<section class="course-section">

<div class="container">

<h2>

Choose Your Class 1 Course

</h2>

<p>

Let's see if you are eligible for this course

</p>

<div class="course-buttons">

<button
class="course-btn active">

121.5 Hrs

</button>

<a
href="enroll-244hrs.html"
class="course-btn">

244 Hrs

</a>

</div>

</div>

</section>

<!-- ===========================
WIZARD
=========================== -->

<section class="wizard-section">

<div class="container">

<div class="wizard-card">

<div id="wizard">

<h2 id="questionTitle">

Are you 18 or plus?

</h2>

<div id="answers">

<button
class="answer-btn"
id="yesBtn">

Yes

</button>

<button
class="answer-btn"
id="noBtn">

No

</button>

</div>

</div>

</div>

</div>

</section>

<!-- ===========================
RESULT
=========================== -->

<section
id="resultSection"
style="display:none;">

<div class="container">

<div class="result-card">

<h2 id="resultTitle"></h2>

<p id="resultText"></p>

<button
id="resultButton">

Continue

</button>

</div>

</div>

</section>

<!-- ===========================
FORM
=========================== -->

<section
id="registrationSection"
style="display:none;">

<div class="container">

<div class="registration-card">

<h2 id="formHeading">

Registration Request for Class 1

</h2>

<p id="formDescription">

Complete the form below and our team will contact you.

</p>

<input
type="hidden"
id="selectedLicence">

<input
type="hidden"
id="eligibilityResult">

<form id="registrationForm">

<div class="form-grid">

<div>

<label>

First Name

</label>

<input type="text">

</div>

<div>

<label>

Last Name

</label>

<input type="text">

</div>

<div>

<label>

Phone

</label>

<input type="tel">

</div>

<div>

<label>

Email

</label>

<input type="email">

</div>

<div>

<label>

Selected Course

</label>

<input
type="text"
value="Class 1 (121.5 Hrs)"
readonly>

</div>

<div>

<label>

Branch

</label>

<select>

<option>

Choose Branch

</option>

<option>

Winnipeg

</option>

<option>

Steinbach

</option>

<option>

Portage la Prairie

</option>

</select>

</div>

<div>

<label>

Preferred Intake

</label>

<select>

<option>

Choose Intake

</option>

</select>

</div>

<div>

<label>

Message

</label>

<textarea rows="6"></textarea>

</div>

<button type="submit">

Submit Registration

</button>

</form>

</div>

</div>

</section>

<!-- ===========================
FOOTER
=========================== -->

<div id="site-footer"></div>

<script>

fetch("header.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("site-header").innerHTML=data;
});

fetch("footer.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("site-footer").innerHTML=data;
});

</script>

</body>

</html>
