<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Enroll in Class 3 | Barnala Driver Training Academy
    </title>

    <meta name="description"
          content="Check your eligibility and enroll in Barnala Driver Training Academy's Class 3 Driver Training Program.">

    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/enroll-class3.css">

</head>

<body>

    <!-- ===========================
         HEADER
    ============================ -->

    <div id="header"></div>

    <main>

        <!-- ===========================
             HERO
        ============================ -->

        <section class="hero">

            <div class="hero-overlay"></div>

            <div class="hero-content">

                <span class="hero-tag">

                    CLASS 3 DRIVER TRAINING

                </span>

                <h1>

                    Class 3 Enrollment

                </h1>

                <p>

                    Complete a quick eligibility check.
                    If you qualify, you'll immediately continue
                    to the registration form without leaving
                    this page.

                </p>

            </div>

        </section>

        <!-- ===========================
             ENROLLMENT WIZARD
        ============================ -->

        <section class="wizard-section">

            <div class="wizard-card">

                <!-- Progress -->

                <div class="progress-wrapper">

                    <div class="progress-bar">

                        <span id="progressFill"></span>

                    </div>

                    <div class="progress-info">

                        <span id="progressText">

                            Step 1 of 6

                        </span>

                        <button
                            id="backBtn"
                            class="back-btn"
                            style="display:none;">

                            ← Back

                        </button>

                    </div>

                </div>

                <!-- Dynamic Content -->

                <div id="wizardContent">

                </div>

            </div>

        </section>

    </main>

    <!-- ===========================
         FOOTER
    ============================ -->

    <div id="footer"></div>

    <script src="include.js"></script>

    <script>

        /*

        JavaScript will be added in
        Part 3, Part 4, Part 5 and Part 6.

        */

    </script>

</body>

</html>
