<style>

/* =========================
   RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

.modern-header{
    position:sticky;
    top:0;
    z-index:99999;
    background:#111;
    border-bottom:1px solid #262626;
}

.modern-nav{
    width:min(94%,1400px);
    margin:auto;
    min-height:86px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:40px;
}

.modern-logo{
    display:flex;
    align-items:center;
    gap:14px;
    text-decoration:none;
    flex-shrink:0;
}

.modern-logo img{
    width:56px;
    height:56px;
    object-fit:cover;
    border-radius:8px;
}

.logo-content{
    display:flex;
    flex-direction:column;
}

.logo-title{
    color:#fff;
    font-size:22px;
    font-weight:800;
    line-height:1;
}

.logo-subtitle{
    color:#0057B8;
    font-size:11px;
    font-weight:700;
    letter-spacing:.6px;
    margin-top:6px;
}

.modern-links{
    display:flex;
    align-items:center;
    gap:16px;
    margin-left:auto;
}

.modern-links>a,
.dropdown-toggle{

    background:none;
    border:none;
    color:#fff;
    text-decoration:none;
    cursor:pointer;
   white-space: nowrap;
    font-size:12px;
    font-weight:700;
    transition:.25s;
}

.modern-links>a:hover,
.dropdown-toggle:hover{
    color:#0057B8;
}

/* =========================
   DROPDOWN
========================= */

.menu-item{
    position:relative;
}

.dropdown-toggle{
    display:flex;
    align-items:center;
    gap:8px;
}

.dropdown-menu{

    position:absolute;
    top:100%;
    left:50%;
    transform:translateY(15px);

    width:500px;
    max-width:90vw;

    background:#161616;
    border-top:3px solid #0057B8;

    display:grid;
    grid-template-columns:1fr 1fr;
    gap:35px;

    padding:28px 35px;

    opacity:0;
    visibility:hidden;

    transition:all .3s ease;

    box-shadow:0 20px 50px rgba(0,0,0,.35);

    z-index:99999;

}

.has-dropdown:hover .dropdown-menu{
    opacity:1;
    visibility:visible;
    transform:translateX(-50%) translateY(15px);
}

.dropdown-column{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.dropdown-column h4{
    color:#0057B8;
    font-size:12px;
    margin-bottom:10px;
   text-transform:uppercase;
}

.dropdown-column a{

    color:#fff;
    text-decoration:none;
    font-size:15px;
    padding:4px 0;
    transition:.25s;

}

.dropdown-column a:hover{

    color:#0057B8;
    padding-left:6px;

}
/* =========================
   MOBILE MENU
========================= */

.menu-toggle{
    display:none;
    width:52px;
    height:52px;
    background:#0057B8;
    border:none;
    border-radius:6px;
    cursor:pointer;
    position:relative;
    z-index:99998;
}

.menu-toggle span{
    position:absolute;
    left:12px;
    width:28px;
    height:3px;
    background:#fff;
    transition:.3s;
}

.menu-toggle span:nth-child(1){top:16px;}
.menu-toggle span:nth-child(2){top:24px;}
.menu-toggle span:nth-child(3){top:32px;}

.menu-toggle.active span:nth-child(1){
    transform:rotate(45deg);
    top:24px;
}

.menu-toggle.active span:nth-child(2){
    opacity:0;
}

.menu-toggle.active span:nth-child(3){
    transform:rotate(-45deg);
    top:24px;
}

.menu-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    opacity:0;
    visibility:hidden;
    transition:.3s;
    z-index:99998;
}

.menu-overlay.active{
    opacity:1;
    visibility:visible;
}

.menu-close{
    display:none;
}

@media(max-width:1200px){

    .menu-toggle{
        display:block;
    }

    .modern-links{

        position:fixed;
        top:0;
        right:-100%;

        width:320px;
        max-width:90%;

        height:100vh;

        background:#111;

        display:flex;
        flex-direction:column;
        align-items:flex-start;

        gap:0;

        padding:90px 28px 40px;

        overflow-y:auto;

        transition:right .35s ease;

        z-index:100000;
    }

    .modern-links.active{
        right:0;
    }

    .modern-links>a,
    .dropdown-toggle{

        width:100%;
        text-align:left;
        padding:18px 0;
        border-bottom:1px solid #2d2d2d;
        font-size:17px;
    }

    .menu-close{
    display:block;
    position:absolute;
    top:20px;
    right:20px;

    background:none;
    border:none;
    color:#fff;

    font-size:34px;
    cursor:pointer;

    z-index:100002;
}
    .dropdown-menu{

        position:static;

        width:100%;

        display:none;

        opacity:1;
        visibility:visible;
        transform:none;

        grid-template-columns:1fr;

        background:#1b1b1b;

        padding:20px;

        margin:10px 0 20px;

        box-shadow:none;
    }

    .has-dropdown.open .dropdown-menu{
        display:grid;
    }

}

@media(min-width:1201px){

.has-dropdown:hover .dropdown-menu{

    opacity:1;
    visibility:visible;
    transform:translateY(0);

}

}

</style>
<header class="modern-header">

    <div class="modern-nav">

        <!-- Logo -->

        <a href="index.html" class="modern-logo">

            <img src="313274994_620903819822534_6596630732526167606_n.jpeg"
                 alt="Barnala Driver Training Academy">

            <div class="logo-content">
                <span class="logo-title">BARNALA</span>
                <span class="logo-subtitle">DRIVER TRAINING ACADEMY</span>
            </div>

        </a>

        <!-- Mobile Button -->

        <button class="menu-toggle" id="menuToggle">

            <span></span>
            <span></span>
            <span></span>

        </button>

        <!-- Overlay -->

        <div class="menu-overlay" id="menuOverlay"></div>

        <!-- Navigation -->

        <nav class="modern-links" id="mainMenu">

            <button class="menu-close" id="menuClose">✕</button>

            <a href="#">ENROLL</a>

            <!-- CLASS 1 -->

            <div class="menu-item has-dropdown">

                <button class="dropdown-toggle">

                    CLASS 1

                    <span>+</span>

                </button>

                <div class="dropdown-menu">

                    <div class="dropdown-column">

                        <h4>CLASS 1 PROGRAMS</h4>

                        <a href="class-1-121-hours.html">Class 1 (121.5 Hrs)</a>

                        <a href="class-1-244-hours.html">Class 1 (244 Hrs)</a>

                    </div>

                    <div class="dropdown-column">

                        <h4>MORE</h4>

                        <a href="check-eligibility.html">Check Eligibility</a>

                       <a href="enroll.html">Enroll</a>

                        <a href="handbooks-class1.html">Handbook</a>

                        <a href="quiz-class1.html">Quiz Practice</a>

                        <a href="compare.html">Compare</a>

                        <a href="#">Financing</a>

                    </div>

                </div>

            </div>

            <a href="#">CLASS 3</a>

            <a href="#">CLASS 5</a>

            <a href="#">AIR BRAKE</a>

            <a href="#">EXCLUSIVE COURSES</a>

            <a href="#">COURSE SCHEDULE</a>

            <a href="#">CORPORATE</a>

            <a href="#">EXCELERATE</a>

            <a href="#">BLOGS</a>

        </nav>

    </div>

</header>
<script>

const menuToggle = document.getElementById("menuToggle");
const menu = document.getElementById("mainMenu");
const closeBtn = document.getElementById("menuClose");
const overlay = document.getElementById("menuOverlay");

/* =========================
   OPEN MENU
========================= */

menuToggle.addEventListener("click", function(){

    menu.classList.add("active");
    overlay.classList.add("active");
    menuToggle.classList.add("active");

    document.body.style.overflow = "hidden";

});

/* =========================
   CLOSE FUNCTION
========================= */

function closeMenu(){

    menu.classList.remove("active");
    overlay.classList.remove("active");
    menuToggle.classList.remove("active");

    document.body.style.overflow = "";

}

/* Close Button */

closeBtn.addEventListener("click", closeMenu);

/* Overlay */

overlay.addEventListener("click", closeMenu);

/* ESC Key */

document.addEventListener("keydown", function(e){

    if(e.key==="Escape"){
        closeMenu();
    }

});

/* Close when clicking a normal menu link */

document.querySelectorAll("#mainMenu > a").forEach(function(link){

    link.addEventListener("click", function(){

        if(window.innerWidth<=1200){
            closeMenu();
        }

    });

});

/* =========================
   MOBILE DROPDOWN
========================= */

document.querySelectorAll(".dropdown-toggle").forEach(function(btn){

    btn.addEventListener("click", function(e){

        if(window.innerWidth<=1200){

            e.preventDefault();

            this.parentElement.classList.toggle("open");

        }

    });

});

/* =========================
   RESET ON DESKTOP
========================= */

window.addEventListener("resize", function(){

    if(window.innerWidth>1200){

        closeMenu();

        document.querySelectorAll(".has-dropdown").forEach(function(item){

            item.classList.remove("open");

        });

    }

});

</script>
